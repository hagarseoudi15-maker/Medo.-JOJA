<!DOCTYPE html>

    <style>
        :root { --primary: #ff4d6d; --accent: #ffccd5; --bg: #fff0f3; --white: #ffffff; }
        body { margin: 0; padding: 0; background: var(--bg); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 90%; max-width: 450px; text-align: center; animation: fadeIn 1s ease; }
        .main-card { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 40px; box-shadow: 0 20px 50px rgba(255, 77, 109, 0.15); border: 2px solid var(--white); backdrop-filter: blur(5px); }
        .photo-album { position: relative; height: 160px; margin-bottom: 20px; display: flex; justify-content: center; }
        .medo-img { width: 130px; height: 130px; border-radius: 30px; object-fit: cover; border: 4px solid var(--white); box-shadow: 0 10px 20px rgba(0,0,0,0.1); animation: fadeSlide 12s infinite; opacity: 0; position: absolute; }
        .medo-img:nth-child(1) { animation-delay: 0s; }
        .medo-img:nth-child(2) { animation-delay: 4s; }
        .medo-img:nth-child(3) { animation-delay: 8s; }
        h1 { color: var(--primary); font-size: 26px; margin: 10px 0; }
        .names { color: var(--accent); font-size: 19px; font-weight: bold; display: block; margin-bottom: 15px; letter-spacing: 1px; }
        #msg-display { background: #fff5f6; padding: 25px 20px; border-radius: 20px; color: #444; min-height: 80px; border-right: 6px solid var(--primary); font-size: 16px; line-height: 1.8; transition: 0.5s; font-weight: 500; display: flex; align-items: center; justify-content: center; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; margin-top: 25px; font-weight: bold; width: 100%; font-size: 16px; transition: 0.3s; box-shadow: 0 5px 15px rgba(255, 77, 109, 0.2); }
        .btn-action:hover { background: #ff758f; transform: scale(1.02); }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 25px; }
        .time-box { background: var(--white); padding: 12px 5px; border-radius: 15px; border: 1px solid #eee; }
        .time-box span { display: block; font-size: 20px; font-weight: 800; color: var(--primary); }
        @keyframes fadeSlide { 0%, 25% { opacity: 1; transform: scale(1); } 30%, 100% { opacity: 0; transform: scale(0.9); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
